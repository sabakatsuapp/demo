<style>
  :root{ --bg:#0e120a; --card:#18200f; --line:#3a4a26; --accent:#b8d464; --sub:#8a9470; --text:#e8ead4; --err:#e06a6a; }

  .err{color:var(--err);font-size:12px;margin-top:10px;min-height:16px;}
  #content{position:fixed;inset:0;width:100%;height:100%;border:0;display:none;background:#fff;}

  const b2 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
  async function unlock(pw){
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b2(ENC.salt), iterations:ENC.iter, hash:'SHA-256' },
      km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b2(ENC.iv) }, key, b2(ENC.data));
    return new TextDecoder('utf-8').decode(pt);
  }
  async function tryOpen(){
    const pw = document.getElementById('pw').value;
    const err = document.getElementById('err'); err.textContent = '';
    try {
      const html = await unlock(pw);
      const f = document.getElementById('content'); f.srcdoc = html; f.style.display = 'block';
      document.getElementById('gate').style.display = 'none';
    } catch(e){ err.textContent = 'パスワードが違います'; }
  }
  document.getElementById('go').addEventListener('click', tryOpen);
  document.getElementById('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryOpen(); });
